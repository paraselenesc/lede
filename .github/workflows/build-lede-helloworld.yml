name: Build LEDE with helloworld

on:
  workflow_dispatch:
    inputs:
      helloworld_branch:
        description: 'helloworld branch'
        required: false
        default: 'master'
        type: string

permissions:
  contents: read

jobs:

  build_lede:

    name: Build LEDE Firmware

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout LEDE
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref_name }}

      - name: Space cleanup
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libnsl-dev
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Configure feeds
        run: |
          # Use helloworld fork from ${{ github.repository_owner }}/helloworld
          sed -i 's|#src-git helloworld.*|src-git helloworld https://github.com/${{ github.repository_owner }}/helloworld.git;${{ inputs.helloworld_branch }}|' ./feeds.conf.default
          cat ./feeds.conf.default | grep helloworld

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        run: make defconfig

      - name: Download packages
        run: make download -j16

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin

      - name: Prepare artifact
        run: |
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/ 2>/dev/null || true
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/ 2>/dev/null || true

      - name: Upload buildinfo
        uses: actions/upload-artifact@v4
        if: env.ARTIFACT_NAME == '' || true
        with:
          name: LEDE_buildinfo
          path: ./artifact/buildinfo/
          retention-days: 7

      - name: Upload package
        uses: actions/upload-artifact@v4
        if: env.ARTIFACT_NAME == '' || true
        with:
          name: LEDE_package
          path: ./artifact/package/
          retention-days: 7

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: LEDE_firmware
          path: ./bin/targets/
          retention-days: 7
