name: OpenWrt-CI

on:
  schedule:
    - cron: 0 20 * * *

permissions:
  contents: read

jobs:

  build_openwrt:

    name: Build OpenWrt Firmware

    runs-on: ubuntu-22.04

    steps:
      - name: Space cleanup and Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          # Ensure clang++ is available for gn build
          sudo ln -sf /usr/bin/clang /usr/bin/clang++ || true
          sudo ln -sf /usr/bin/clang-14 /usr/bin/clang++ || true
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Checkout OpenWrt
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Update feeds
        run: |
          # helloworld packages are already in package/helloworld directory
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration file
        run: |
          # Set default config for x86_64
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_generic=y" >> .config
          # Network drivers
          echo "CONFIG_PACKAGE_kmod-igb=y" >> .config
          echo "CONFIG_PACKAGE_kmod-e1000=y" >> .config
          echo "CONFIG_PACKAGE_kmod-r8169=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rt2800-pci=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ath9k=y" >> .config
          # LuCI
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ddns=y" >> .config
          # Helloworld packages (from package/helloworld feed)
          # SSR Plus+ (includes shadowsocks, v2ray, xray, trojan support)
          echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y" >> .config
          # Core components for SSR Plus+
          echo "CONFIG_PACKAGE_shadowsocksr-libev=y" >> .config
          echo "CONFIG_PACKAGE_shadowsocks-libev=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-core=y" >> .config
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          echo "CONFIG_PACKAGE_trojan=y" >> .config
          echo "CONFIG_PACKAGE_naiveproxy=y" >> .config
          echo "CONFIG_PACKAGE_hysteria=y" >> .config
          echo "CONFIG_PACKAGE_tuic-client=y" >> .config
          # DNS tools
          echo "CONFIG_PACKAGE_chinadns-ng=y" >> .config
          echo "CONFIG_PACKAGE_dns2socks=y" >> .config
          echo "CONFIG_PACKAGE_dns2tcp=y" >> .config
          echo "CONFIG_PACKAGE_dnsproxy=y" >> .config
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          # Other useful packages
          echo "CONFIG_PACKAGE_redsocks2=y" >> .config
          echo "CONFIG_PACKAGE_ipt2socks=y" >> .config
          echo "CONFIG_PACKAGE_microsocks=y" >> .config
          echo "CONFIG_PACKAGE_tcping=y" >> .config
          # System utilities
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_vim=y" >> .config
          echo "CONFIG_PACKAGE_wget=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_iperf3=y" >> .config
          # VPN - WireGuard
          echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wireguard-zh-cn=y" >> .config
          # VPN - Tailscale
          echo "CONFIG_PACKAGE_tailscale=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-tailscale=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-tailscale-zh-cn=y" >> .config
          # Network management
          echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-nlbwmon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-nft-qos=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wol=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-arpbind=y" >> .config
          # Traffic acceleration
          echo "CONFIG_PACKAGE_luci-app-flowoffload=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-fullconenat=y" >> .config
          # USB storage support
          echo "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage-uas=y" >> .config
          echo "CONFIG_PACKAGE_block-mount=y" >> .config
          # System management
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-autoreboot=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-syslog=y" >> .config
          make defconfig

      - name: Download packages
        run: make download -j16

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin

      - name: Prepare Artifacts
        run: |
          mkdir -p ./artifact/firmware
          mkdir -p ./artifact/packages
          mkdir -p ./artifact/buildinfo
          
          # Copy firmware files only (img, sysupgrade, factory)
          find ./bin/targets/ -type f \( -name "*.img" -o -name "*.img.gz" -o -name "*.sysupgrade" -o -name "*.factory" \) -exec cp {} ./artifact/firmware/ \;
          
          # Copy packages
          find ./bin/packages/ -name "*.ipk" -exec cp {} ./artifact/packages/ \;
          
          # Copy build info
          find ./bin/targets/ -name "*.buildinfo" -o -name "*.manifest" -exec cp {} ./artifact/buildinfo/ \;
          
          # Create file lists
          ls -la ./artifact/firmware/ > ./artifact/firmware/filelist.txt
          ls -la ./artifact/packages/ > ./artifact/packages/filelist.txt
          
          # Create build summary
          echo "Build Summary:" > ./artifact/build_summary.txt
          echo "Target: x86_64" >> ./artifact/build_summary.txt
          echo "Build Date: $(date)" >> ./artifact/build_summary.txt
          echo "Git Commit: ${{ github.sha }}" >> ./artifact/build_summary.txt
          echo "Firmware Files: $(ls ./artifact/firmware/*.img* ./artifact/firmware/*.sysupgrade ./artifact/firmware/*.factory 2>/dev/null | wc -l)" >> ./artifact/build_summary.txt
          echo "Package Files: $(ls ./artifact/packages/*.ipk 2>/dev/null | wc -l)" >> ./artifact/build_summary.txt

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: ./artifact/firmware/
          retention-days: 30

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_packages
          path: ./artifact/packages/
          retention-days: 30

      - name: Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_buildinfo
          path: ./artifact/buildinfo/
          retention-days: 30

      - name: Upload Build Summary
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_summary
          path: ./artifact/build_summary.txt
          retention-days: 30
